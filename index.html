<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Church Slavery Atlas</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    #map { height: 100vh; width: 100%; }

    #controls {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(252, 248, 240, 0.96);
      border: 1px solid #b8a88a;
      border-radius: 4px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      white-space: nowrap;
    }

    #search-box {
      font-family: inherit;
      font-size: 13px;
      border: 1px solid #b8a88a;
      border-radius: 3px;
      padding: 5px 10px;
      background: #fff;
      color: #3a2e1e;
      width: 200px;
    }
    #search-box:focus { outline: none; border-color: #7a6040; box-shadow: 0 0 0 2px rgba(120,96,64,0.15); }
    #search-box::placeholder { color: #9a8a70; }

    #search-wrap {
      position: relative;
    }

    #match-count {
      position: absolute;
      top: calc(100% + 5px);
      left: 0;
      font-size: 11px;
      color: #7a6040;
      white-space: nowrap;
      background: rgba(252, 248, 240, 0.92);
      padding: 1px 6px;
      border-radius: 3px;
      pointer-events: none;
    }

    .toggle-label {
      font-size: 12px;
      color: #3a2e1e;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      user-select: none;
    }
    .toggle-label input { cursor: pointer; }

    /* Year range inputs */
    #timeline-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      border-left: 1px solid #b8a88a;
      padding-left: 14px;
    }
    #timeline-label {
      font-size: 12px;
      color: #7a6040;
      white-space: nowrap;
    }
    .year-input {
      font-family: inherit;
      font-size: 13px;
      border: 1px solid #b8a88a;
      border-radius: 3px;
      padding: 4px 7px;
      background: #fff;
      color: #3a2e1e;
      width: 62px;
      text-align: center;
    }
    .year-input:focus { outline: none; border-color: #7a6040; box-shadow: 0 0 0 2px rgba(120,96,64,0.15); }
    .year-input.invalid { border-color: #cc2200; box-shadow: 0 0 0 2px rgba(204,34,0,0.15); }
    #year-sep {
      font-size: 12px;
      color: #7a6040;
    }

    .legend {
      background: rgba(252, 248, 240, 0.96);
      border: 1px solid #b8a88a;
      padding: 16px 20px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 15px;
      color: #3a2e1e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      line-height: 1.7;
    }
    .legend h4 {
      font-size: 13px;
      text-transform: lowercase;
      letter-spacing: 0.07em;
      color: #7a6040;
      margin-bottom: 8px;
      font-weight: normal;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 5px;
    }
    .swatch {
      display: inline-block;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.6);
    }
.leaflet-popup-content {
      font-family: inherit;
      font-size: 12px;
      line-height: 1.4;
      color: #2a1e0e;
      max-height: 260px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .popup-source {
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 0.06em;
      color: #7a6040;
      text-transform: lowercase;
      margin-bottom: 3px;
    }
    .popup h3 {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 3px;
      color: #1a0e00;
    }
    .popup p { margin: 0 0 1px; }
    .popup strong { color: #5a4020; }
    .popup em { color: #5a5040; font-style: italic; }
    .popup mark { background: #f5d97a; color: inherit; border-radius: 2px; padding: 0 1px; }


    .point-marker-icon { background: none !important; border: none !important; }

    #reset-zoom {
      font-family: inherit;
      font-size: 12px;
      color: #7a6040;
      background: none;
      border: 1px solid #b8a88a;
      border-radius: 3px;
      padding: 4px 9px;
      cursor: pointer;
      white-space: nowrap;
    }
    #reset-zoom:hover { background: rgba(184,168,138,0.15); color: #3a2e1e; }

    #basemap-select {
      font-family: inherit;
      font-size: 12px;
      border: 1px solid #b8a88a;
      border-radius: 3px;
      padding: 4px 7px;
      background: #fff;
      color: #3a2e1e;
      cursor: pointer;
    }
    #basemap-select:focus { outline: none; border-color: #7a6040; }

    .geo-label {
      white-space: nowrap;
      font-family: Georgia, 'Times New Roman', serif;
      font-style: italic;
      color: rgba(60, 35, 5, 0.82);
      text-shadow:
        0 0 8px rgba(252, 248, 230, 1),
        0 0 16px rgba(252, 248, 230, 1),
        0 0 3px rgba(252, 248, 230, 1);
      line-height: 1;
      user-select: none;
      pointer-events: none;
      transform: translate(-50%, -50%);
      display: block;
    }

    #debug-box {
      position: fixed;
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(0, 0, 0, 0.72);
      color: #d4f0a0;
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 14px;
      padding: 5px 14px;
      border-radius: 4px;
      pointer-events: none;
      white-space: nowrap;
    }

    .cluster-tooltip {
      background: rgba(252, 248, 240, 0.95);
      border: 1px solid #b8a88a;
      border-radius: 4px;
      color: #3a2e1e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 12px;
      padding: 4px 8px;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .cluster-tooltip::before { display: none; }

    .marker-cluster-atlas {
      background: rgba(252, 248, 240, 0.9);
      border: 2px solid #b8a88a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 12px;
      font-weight: bold;
      color: #3a2e1e;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="controls">
  <div id="search-wrap">
    <input id="search-box" type="text" placeholder="Search country, note, reference…" autocomplete="off" />
    <span id="match-count"></span>
  </div>
  <label class="toggle-label">
    <input type="checkbox" id="toggle-world" /> World Dataset
  </label>
  <label class="toggle-label">
    <input type="checkbox" id="toggle-french" checked /> French Clergy
  </label>
  <label class="toggle-label">
    <input type="checkbox" id="toggle-labels" checked /> Map labels
  </label>
  <select id="basemap-select">
    <option value="antique">Antique</option>
    <option value="World_Topo_Map">Modern</option>
  </select>

  <button id="reset-zoom">Reset zoom</button>

  <div id="timeline-wrap">
    <span id="timeline-label">year</span>
    <input type="number" id="year-min" class="year-input" value="1600" placeholder="from" />
    <span id="year-sep">–</span>
    <input type="number" id="year-max" class="year-input" value="1820" placeholder="to" />
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/esri-leaflet@3/dist/esri-leaflet.js"></script>
<script src="https://unpkg.com/esri-leaflet-vector@4/dist/esri-leaflet-vector.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="labels.js"></script>
<script>
  const EMPIRE_COLORS = {
    'British/U.S.': '#8B0000',
    'French':       '#003399',
    'Spanish':      '#A68C00',
    'Portuguese':   '#1a6600',
  };
  const DEFAULT_COLOR = '#888888';
  const MIN_RADIUS = 8;
  const MAX_RADIUS = 40;
  const GLOBAL_MAX = 7000;
  const YEAR_MIN = 1600;
  const YEAR_MAX = 1820;
  // from this zoom level onwards, clicking on a cluster expands it instead of zooming in
  const SPIDERFY_ZOOM = 9;

  function calcRadius(count) {
    const n = parseFloat(count);
    if (!n || n <= 0) return MIN_RADIUS;
    return MIN_RADIUS + (Math.sqrt(n) / Math.sqrt(GLOBAL_MAX)) * (MAX_RADIUS - MIN_RADIUS);
  }

  function parseYear(str) {
    if (!str) return null;
    const m = String(str).match(/\d{4}/);
    return m ? parseInt(m[0]) : null;
  }

  const WORLD_BOUNDS = L.latLngBounds([[-90, -180], [90, 180]]);

  const map = L.map('map', {
    zoomControl: true,
    maxBounds: WORLD_BOUNDS,
    maxBoundsViscosity: 1.0,
  }).setView([15, -20], 3);
  map.attributionControl.setPrefix('<a href="https://leafletjs.com" title="A JavaScript library for interactive maps">Leaflet</a>');

  // Stacked panes so the antique basemap layers composite in the right order, with the
  // opacity + blend modes the ArcGIS web map assigns (esri-leaflet-vector renders each layer
  // as its own canvas, so cross-layer blending must be done here via CSS). All below the
  // marker/cluster panes (z-index 600+).
  [
    ['bm-base',  200, 1,    'normal',     'sepia(1) brightness(0.8) hue-rotate(-30deg)'],
    ['bm-hill',  210, 0.3,  'normal',     'none'],
    ['bm-bathy', 220, 0.3, 'normal', 'hue-rotate(-80deg)'],
    ['bm-parch', 230, 1,    'multiply',   'none'],
    ['bm-fold',  240, 0.9,  'color-burn', 'none'],
  ].forEach(([name, z, opacity, blend, filter]) => {
    map.createPane(name);
    const pane = map.getPane(name);
    pane.style.zIndex = z;
    pane.style.opacity = opacity;
    pane.style.mixBlendMode = blend;
    pane.style.filter = filter;
  });

  // Pane for geographic labels — above basemap (200-240), below data markers (600+)
  map.createPane('geo-labels');
  map.getPane('geo-labels').style.zIndex = 250;
  map.getPane('geo-labels').style.pointerEvents = 'none';

  function updateMinZoom() {
    // At zoom Z the world is 256×2^Z px wide; we need that ≥ viewport width
    // so minZoom = ceil(log2(viewportWidth / 256)).
    // e.g. 1440px → ceil(2.49) = 3, 2560px → ceil(3.32) = 4
    const minZoom = Math.ceil(Math.log2(map.getSize().x / 256));
    map.setMinZoom(minZoom);
  }
  map.on('resize', updateMinZoom);
  updateMinZoom();

  function makeBasemap(serviceId) {
    return L.tileLayer(
      `https://server.arcgisonline.com/ArcGIS/rest/services/${serviceId}/MapServer/tile/{z}/{y}/{x}`,
      { attribution: 'Tiles &copy; Esri', maxNativeZoom: 13, maxZoom: 13, noWrap: true }
    );
  }

  // Replicates the ArcGIS "Khaki Basemap" stack: khaki land/water base, hillshade relief,
  // dark bathymetry, plus parchment grain and folded-paper crease textures on top.
  function makeAntiqueBasemap() {
    return L.layerGroup([
      L.esri.Vector.vectorTileLayer('abd999723d734c3f8cc2274bf2b6d22d', { pane: 'bm-base' }),
      L.tileLayer(
        'https://services.arcgisonline.com/arcgis/rest/services/Elevation/World_Hillshade/MapServer/tile/{z}/{y}/{x}',
        { pane: 'bm-hill', noWrap: true, attribution: 'Tiles &copy; Esri' }
      ),
      L.esri.Vector.vectorTileLayer('a57be56f4279434b9f400620e70a99f5', { pane: 'bm-bathy' }),
      L.esri.Vector.vectorTileLayer('34b03208322246b08665189c0fffab7b', { pane: 'bm-parch' }),
      L.esri.Vector.vectorTileLayer('b0c7f075d98e4b91b6cd2bdfaf7288af', { pane: 'bm-fold' }),
      L.esri.Vector.vectorTileLayer('a57be56f4279434b9f400620e70a99f5', { pane: 'bm-coast' }),
    ]);
  }

  let basemapLayer = makeAntiqueBasemap().addTo(map);



  const legend = L.control({ position: 'bottomright' });
  legend.onAdd = function () {
    const div = L.DomUtil.create('div', 'legend');
    const empireRows = Object.entries(EMPIRE_COLORS).map(([name, color]) =>
      `<div class="legend-item">
        <span class="swatch" style="background:${color}"></span>${name}
      </div>`
    ).join('');

    div.innerHTML = `
      <h4>Empire</h4>
      ${empireRows}
    `;
    return div;
  };
  legend.addTo(map);

  let allPoints = [];
  const markersLayer = L.markerClusterGroup({
    showCoverageOnHover: false,
    zoomToBoundsOnClick: false,
    maxClusterRadius: function(zoom) { return zoom >= 9 ? 1 : 50; },
    iconCreateFunction: function(cluster) {
      const size = 34;
      const r = size / 2;
      const children = cluster.getAllChildMarkers();
      const colorCounts = {};
      children.forEach(m => {
        const c = m.options.empireColor || DEFAULT_COLOR;
        colorCounts[c] = (colorCounts[c] || 0) + 1;
      });
      const total = children.length;
      const entries = Object.entries(colorCounts);
      let slices = '';
      if (entries.length === 1) {
        slices = `<circle cx="${r}" cy="${r}" r="${r}" fill="${entries[0][0]}" opacity="0.45"/>`;
      } else {
        let angle = -Math.PI / 2;
        entries.forEach(([color, count]) => {
          const sweep = (count / total) * 2 * Math.PI;
          const end = angle + sweep;
          const x1 = r + r * Math.cos(angle), y1 = r + r * Math.sin(angle);
          const x2 = r + r * Math.cos(end),   y2 = r + r * Math.sin(end);
          const large = sweep > Math.PI ? 1 : 0;
          slices += `<path d="M${r},${r} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="${color}" opacity="0.45"/>`;
          angle = end;
        });
      }
      const html = `<svg width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">${slices}<circle cx="${r}" cy="${r}" r="${r - 0.6}" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.2"/></svg>`;
      return L.divIcon({ html, className: '', iconSize: L.point(size, size), iconAnchor: L.point(r, r) });
    },
  }).addTo(map);

  const clusterTooltip = L.tooltip({ permanent: false, direction: 'right', offset: [10, 0], className: 'cluster-tooltip' });

  markersLayer.on('clustermouseover', function(e) {
    const count = e.layer.getChildCount();
    const action = map.getZoom() >= SPIDERFY_ZOOM ? 'expand' : 'zoom in';
    clusterTooltip.setContent(`${count} entr${count === 1 ? 'y' : 'ies'} — click to ${action}`);
    clusterTooltip.setLatLng(e.layer.getLatLng());
    clusterTooltip.addTo(map);
  });

  markersLayer.on('clustermouseout', function() {
    clusterTooltip.remove();
  });

  markersLayer.on('clusterclick', function(e) {
    if (map.getZoom() >= SPIDERFY_ZOOM) {
      e.layer.spiderfy();
    } else {
      e.layer.zoomToBounds({ padding: [20, 20] });
    }
  });

  function normalizeFile1(row) {
    const lat = parseFloat(row.lat);
    const lon = parseFloat(row.lon);
    if (isNaN(lat) || isNaN(lon)) return null;
    const yearStr = row['Approximate Year of Data'] || '';
    return {
      source: 'World Dataset',
      community: row['Community'] || '',
      community2: row['Community2'] || '',
      location: [row['Location'], row['Location2']].filter(Boolean).join(', '),
      site: '',
      country: row['Country'] || '',
      empire: (row['Empire'] || '').trim(),
      year: yearStr,
      yearNum: parseYear(yearStr),
      count: row['Volume'],
      countLabel: row['Total Enslaved Persons'] || row['Volume'] || '',
      reference: row['Reference'] || '',
      note: row['Note'] || '',
      lat, lon,
    };
  }

  function normalizeFile2(row) {
    const lat = parseFloat(row.lat);
    const lon = parseFloat(row.lon);
    if (isNaN(lat) || isNaN(lon)) return null;
    const yearStr = row['Approximate Year of Data'] || '';
    return {
      source: 'French Clergy Dataset',
      community: row['Community'] || '',
      community2: row['Religieux-Religieuses'] || '',
      location: row['Province'] || '',
      site: [row['Site'], row['Site-2']].filter(Boolean).join(', '),
      country: row['Country'] || '',
      empire: (row['Empire'] || '').trim(),
      year: yearStr,
      yearNum: parseYear(yearStr),
      count: row['Number-Approx'],
      countLabel: row['Total Enslaved Persons'] || row['Number-Approx'] || '',
      reference: row['Reference'] || '',
      note: row['Note'] || '',
      lat, lon,
    };
  }

  function highlight(text, query) {
    if (!query || !text) return text;
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return String(text).replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
  }

  const WIKI_URLS = {
    'Augustinian Hospitallers':            'https://en.wikipedia.org/wiki/Canonesses_of_St._Augustine_of_the_Mercy_of_Jesus',
    'Augustinians':                        'https://en.wikipedia.org/wiki/Augustinians',
    'Benedictines':                        'https://en.wikipedia.org/wiki/Benedictines',
    'Brothers Hospitallers':               'https://en.wikipedia.org/wiki/Hospitaller_Order_of_Saint_John_of_God',
    'Capuchins':                           'https://en.wikipedia.org/wiki/Capuchin_Franciscans',
    'Carmelites':                          'https://en.wikipedia.org/wiki/Carmelites',
    'Christian Brothers':                  'https://en.wikipedia.org/wiki/De_La_Salle_Brothers',
    'Company of Mary Our Lady':            'https://en.wikipedia.org/wiki/Sisters_of_the_Company_of_Mary%2C_Our_Lady',
    'Congregation of Notre Dame':          'https://en.wikipedia.org/wiki/Congregation_of_Notre_Dame',
    'Dominicans':                          'https://en.wikipedia.org/wiki/Dominican_Order',
    'Grey Nuns':                           'https://en.wikipedia.org/wiki/Grey_Nuns',
    'Jesuits':                             'https://en.wikipedia.org/wiki/Society_of_Jesus',
    'Lazarists':                           'https://en.wikipedia.org/wiki/Congregation_of_the_Mission',
    'Recollects':                          'https://en.wikipedia.org/wiki/Recollects',
    'Religious Hospitallers of Saint Joseph': 'https://en.wikipedia.org/wiki/Religious_Hospitallers_of_Saint_Joseph',
    'Religious of the Sacred Heart of Jesus': 'https://en.wikipedia.org/wiki/Society_of_the_Sacred_Heart',
    'Seminary of Quebec':                  'https://en.wikipedia.org/wiki/S%C3%A9minaire_de_Qu%C3%A9bec',
    'Sisters of Charity of St. Joseph':    'https://en.wikipedia.org/wiki/Sisters_of_Charity',
    'Sisters of Loretto':                  'https://en.wikipedia.org/wiki/Sisters_of_Loretto',
    'Spiritans':                           'https://en.wikipedia.org/wiki/Congregation_of_the_Holy_Spirit',
    'Sulpicians':                          'https://en.wikipedia.org/wiki/Society_of_Saint-Sulpice',
    'Ursulines':                           'https://en.wikipedia.org/wiki/Ursulines',
  };

  function buildPopup(p, query) {
    const hl = text => highlight(text, query);
    const name1 = hl(p.community);
    const displayName = p.community2 && p.community2 !== p.community
      ? `${name1} <span style="font-weight:normal;color:#666">(${hl(p.community2)})</span>`
      : name1;
    const wikiUrl = WIKI_URLS[p.community];
    return `
      <div class="popup">
        <div class="popup-source">${p.source}</div>
        <h3>${wikiUrl ? `<a href="${wikiUrl}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;text-decoration-color:#b8a88a;">${displayName}</a>` : displayName}</h3>
        ${p.site ? `<p><strong>Site:</strong> ${hl(p.site)}</p>` : ''}
        ${p.location ? `<p><strong>Location:</strong> ${hl(p.location)}</p>` : ''}
        <p><strong>Country:</strong> ${hl(p.country)}</p>
        <p><strong>Empire:</strong> ${p.empire}</p>
        ${p.year ? `<p><strong>Approx. Year:</strong> ${p.year}</p>` : ''}
        <p><strong>Enslaved Persons:</strong> ${p.countLabel}</p>
        ${p.reference ? `<p><strong>Reference:</strong> <em>${hl(p.reference)}</em></p>` : ''}
        ${p.note ? `<p><strong>Note:</strong> ${hl(p.note)}</p>` : ''}
      </div>
    `;
  }

  let _hoverCloseTimer = null;

  function renderPoints(points, query) {
    markersLayer.clearLayers();
    points.forEach(p => {
      const color = EMPIRE_COLORS[p.empire] || DEFAULT_COLOR;
      const radius = calcRadius(p.count);
      const size = radius * 2;
      const icon = L.divIcon({
        html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};opacity:0.53;border:1.2px solid rgba(255,255,255,0.5);box-sizing:border-box;"></div>`,
        className: 'point-marker-icon',
        iconSize: [size, size],
        iconAnchor: [radius, radius],
      });
      const marker = L.marker([p.lat, p.lon], { icon, empireColor: color });
      marker.bindPopup(buildPopup(p, query), {
        maxWidth: 300,
        autoPan: false,
        closeButton: false,
        autoClose: true,
        closeOnClick: false,
      });

      marker.on('mouseover', function() {
        clearTimeout(_hoverCloseTimer);
        this.openPopup();
      });

      marker.on('mouseout', function() {
        const m = this;
        _hoverCloseTimer = setTimeout(() => m.closePopup(), 180);
      });

      marker.on('popupopen', function() {
        const popup = this.getPopup();
        const el = popup.getElement();
        if (!el) return;
        const m = this;

        // Hide immediately — browser won't paint until JS yields, so no flash
        el.style.visibility = 'hidden';

        // Remove previous listeners before re-adding to prevent accumulation
        if (popup._enterHandler) el.removeEventListener('mouseenter', popup._enterHandler);
        if (popup._leaveHandler) el.removeEventListener('mouseleave', popup._leaveHandler);
        popup._enterHandler = () => clearTimeout(_hoverCloseTimer);
        popup._leaveHandler = () => { _hoverCloseTimer = setTimeout(() => m.closePopup(), 180); };
        el.addEventListener('mouseenter', popup._enterHandler);
        el.addEventListener('mouseleave', popup._leaveHandler);

        // Reset only the specific properties we may have set previously
        const tip = el.querySelector('.leaflet-popup-tip-container');
        const wrapper = el.querySelector('.leaflet-popup-content-wrapper');
        if (tip) { tip.style.position = ''; tip.style.top = ''; tip.style.marginTop = ''; tip.style.transform = ''; }
        if (wrapper) { wrapper.style.marginTop = ''; }

        const markerPt = map.latLngToContainerPoint(m.getLatLng());
        const mapRect = map.getContainer().getBoundingClientRect();
        const ctrlBottom = document.getElementById('controls').getBoundingClientRect().bottom - mapRect.top;
        const r = calcRadius(p.count);
        const popupH = el.offsetHeight;
        const flipped = (markerPt.y - r - popupH - 10) < ctrlBottom + 8;

        if (flipped) {
          popup.options.offset = L.point(0, r + popupH + 17 + 10);
          popup.update();
          if (tip) {
            tip.style.position = 'absolute';
            tip.style.top = '0';
            tip.style.marginTop = '0';
            tip.style.transform = 'rotate(180deg)';
          }
          if (wrapper) wrapper.style.marginTop = '17px';
        } else {
          popup.options.offset = L.point(0, -r);
          popup.update();
        }

        el.style.visibility = '';
      });

      markersLayer.addLayer(marker);
    });
  }

  function applyFilters() {
    const query = document.getElementById('search-box').value.trim().toLowerCase();
    const showWorld = document.getElementById('toggle-world').checked;
    const showFrench = document.getElementById('toggle-french').checked;
    const yMin = parseInt(document.getElementById('year-min').value);
    const yMax = parseInt(document.getElementById('year-max').value);
    const rangeValid = !isNaN(yMin) && !isNaN(yMax) && yMin <= yMax;

    const filtered = allPoints.filter(p => {
      if (p.source === 'World Dataset' && !showWorld) return false;
      if (p.source === 'French Clergy Dataset' && !showFrench) return false;
      if (rangeValid && p.yearNum !== null && (p.yearNum < yMin || p.yearNum > yMax)) return false;
      if (!query) return true;
      return (
        p.country.toLowerCase().includes(query) ||
        p.note.toLowerCase().includes(query) ||
        p.reference.toLowerCase().includes(query) ||
        p.community.toLowerCase().includes(query) ||
        p.location.toLowerCase().includes(query) ||
        p.site.toLowerCase().includes(query)
      );
    });

    renderPoints(filtered, query);
    document.getElementById('match-count').textContent =
      `${filtered.length} entr${filtered.length !== 1 ? 'ies' : 'y'} shown`;
  }

  const inputMin = document.getElementById('year-min');
  const inputMax = document.getElementById('year-max');

  function updateYearInputs() {
    const lo = parseInt(inputMin.value);
    const hi = parseInt(inputMax.value);
    const invalid = !isNaN(lo) && !isNaN(hi) && lo > hi;
    inputMin.classList.toggle('invalid', invalid);
    inputMax.classList.toggle('invalid', invalid);
    applyFilters();
  }

  inputMin.addEventListener('input', updateYearInputs);
  inputMax.addEventListener('input', updateYearInputs);

  async function fetchCSV(path) {
    const response = await fetch(path);
    const text = await response.text();
    return Papa.parse(text, { header: true, skipEmptyLines: true });
  }

  async function loadData() {
    document.getElementById('match-count').textContent = 'Loading…';
    try {
      const [r1, r2] = await Promise.all([
        fetchCSV('world_eccl.csv'),
        fetchCSV('french_clergy.csv'),
      ]);
      allPoints = [
        ...r1.data.map(normalizeFile1),
        ...r2.data.map(normalizeFile2),
      ].filter(p => p !== null);
      applyFilters();
    } catch (err) {
      document.getElementById('match-count').textContent = 'Error loading data';
      console.error(err);
    }
  }

  // LABEL_SZ and GEO_LABELS are defined in labels.js

  const labelsGroup = L.layerGroup().addTo(map);
  const labelMarkers = [];

  GEO_LABELS.forEach(def => {
    const icon = L.divIcon({
      html: `<div class="geo-label" style="font-size:${def.size}px;${def.ls ? `letter-spacing:${def.ls};` : ''}">${def.text}</div>`,
      className: '',
      iconSize: [0, 0],
      iconAnchor: [0, 0],
    });
    const marker = L.marker([def.lat, def.lon], {
      icon,
      interactive: false,
      pane: 'geo-labels',
    });
    labelMarkers.push({ marker, def });
    labelsGroup.addLayer(marker);
  });

  function updateLabelVisibility() {
    const z = map.getZoom();
    const showLabels = document.getElementById('toggle-labels').checked;
    labelMarkers.forEach(({ marker, def }) => {
      const el = marker.getElement();
      if (!el) return;
      el.style.display = (showLabels && z >= def.minZoom && z <= def.maxZoom) ? '' : 'none';
    });
  }

  map.on('zoomend', updateLabelVisibility);
  document.getElementById('toggle-labels').addEventListener('change', updateLabelVisibility);
  setTimeout(updateLabelVisibility, 100);

  document.getElementById('search-box').addEventListener('input', applyFilters);
  document.getElementById('toggle-world').addEventListener('change', applyFilters);
  document.getElementById('toggle-french').addEventListener('change', applyFilters);
  document.getElementById('reset-zoom').addEventListener('click', () => map.setView([15, -20], 3));

  document.getElementById('basemap-select').addEventListener('change', function () {
    map.removeLayer(basemapLayer);
    basemapLayer = (this.value === 'antique'
      ? makeAntiqueBasemap()
      : makeBasemap(this.value)).addTo(map);
  });

  if (new URLSearchParams(window.location.search).get('debug') === '1') {
    const box = document.createElement('div');
    box.id = 'debug-box';
    document.body.appendChild(box);
    let cursorLat = null, cursorLng = null;
    function updateDebug() {
      const c = map.getCenter();
      const cursor = cursorLat !== null
        ? `cursor ${cursorLat.toFixed(4)}, ${cursorLng.toFixed(4)}  ·  `
        : '';
      box.textContent = `${cursor}center ${c.lat.toFixed(4)}, ${c.lng.toFixed(4)}  ·  zoom ${map.getZoom()}`;
    }
    map.on('move zoom', updateDebug);
    map.on('click', function(e) {
      cursorLat = e.latlng.lat;
      cursorLng = e.latlng.lng;
      updateDebug();
    });
    updateDebug();
  }

  loadData();
</script>
</body>
</html>
