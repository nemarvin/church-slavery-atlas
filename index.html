<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Church Slavery Atlas</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    #map { height: 100vh; width: 100%; }

    #controls {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(252, 248, 240, 0.96);
      border: 1px solid #b8a88a;
      border-radius: 4px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      white-space: nowrap;
    }

    #search-box {
      font-family: inherit;
      font-size: 13px;
      border: 1px solid #b8a88a;
      border-radius: 3px;
      padding: 5px 10px;
      background: #fff;
      color: #3a2e1e;
      width: 200px;
    }
    #search-box:focus { outline: none; border-color: #7a6040; box-shadow: 0 0 0 2px rgba(120,96,64,0.15); }
    #search-box::placeholder { color: #9a8a70; }

    #search-wrap {
      position: relative;
    }

    #match-count {
      position: absolute;
      top: calc(100% + 5px);
      left: 0;
      font-size: 11px;
      color: #7a6040;
      white-space: nowrap;
      background: rgba(252, 248, 240, 0.92);
      padding: 1px 6px;
      border-radius: 3px;
      pointer-events: none;
    }

    .toggle-label {
      font-size: 12px;
      color: #3a2e1e;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      user-select: none;
    }
    .toggle-label input { cursor: pointer; }

    /* Year range inputs */
    #timeline-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      border-left: 1px solid #b8a88a;
      padding-left: 14px;
    }
    #timeline-label {
      font-size: 12px;
      color: #7a6040;
      white-space: nowrap;
    }
    .year-input {
      font-family: inherit;
      font-size: 13px;
      border: 1px solid #b8a88a;
      border-radius: 3px;
      padding: 4px 7px;
      background: #fff;
      color: #3a2e1e;
      width: 62px;
      text-align: center;
    }
    .year-input:focus { outline: none; border-color: #7a6040; box-shadow: 0 0 0 2px rgba(120,96,64,0.15); }
    .year-input.invalid { border-color: #cc2200; box-shadow: 0 0 0 2px rgba(204,34,0,0.15); }
    #year-sep {
      font-size: 12px;
      color: #7a6040;
    }

    .legend {
      background: rgba(252, 248, 240, 0.96);
      border: 1px solid #b8a88a;
      padding: 12px 14px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
      color: #3a2e1e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      line-height: 1.6;
    }
    .legend h4 {
      font-size: 11px;
      text-transform: lowercase;
      letter-spacing: 0.07em;
      color: #7a6040;
      margin-bottom: 6px;
      font-weight: normal;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 3px;
    }
    .swatch {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.6);
    }
.leaflet-popup-content {
      font-family: inherit;
      font-size: 12px;
      line-height: 1.4;
      color: #2a1e0e;
      max-height: 260px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .popup-source {
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 0.06em;
      color: #7a6040;
      text-transform: lowercase;
      margin-bottom: 3px;
    }
    .popup h3 {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 3px;
      color: #1a0e00;
    }
    .popup p { margin: 0 0 1px; }
    .popup strong { color: #5a4020; }
    .popup em { color: #5a5040; font-style: italic; }
    .popup mark { background: #f5d97a; color: inherit; border-radius: 2px; padding: 0 1px; }


    .point-marker-icon { background: none !important; border: none !important; }

    #reset-zoom {
      font-family: inherit;
      font-size: 12px;
      color: #7a6040;
      background: none;
      border: 1px solid #b8a88a;
      border-radius: 3px;
      padding: 4px 9px;
      cursor: pointer;
      white-space: nowrap;
    }
    #reset-zoom:hover { background: rgba(184,168,138,0.15); color: #3a2e1e; }

    .marker-cluster-atlas {
      background: rgba(252, 248, 240, 0.9);
      border: 2px solid #b8a88a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 12px;
      font-weight: bold;
      color: #3a2e1e;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="controls">
  <div id="search-wrap">
    <input id="search-box" type="text" placeholder="Search country, note, reference…" autocomplete="off" />
    <span id="match-count"></span>
  </div>
  <label class="toggle-label">
    <input type="checkbox" id="toggle-world" /> World Dataset
  </label>
  <label class="toggle-label">
    <input type="checkbox" id="toggle-french" checked /> French Clergy
  </label>
  <label class="toggle-label">
    <input type="checkbox" id="toggle-borders" checked /> Map labels (modern)
  </label>

  <button id="reset-zoom">Reset zoom</button>

  <div id="timeline-wrap">
    <span id="timeline-label">year</span>
    <input type="number" id="year-min" class="year-input" value="1600" placeholder="from" />
    <span id="year-sep">–</span>
    <input type="number" id="year-max" class="year-input" value="1820" placeholder="to" />
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
  const EMPIRE_COLORS = {
    'British/U.S.': '#8B0000',
    'French':       '#003399',
    'Spanish':      '#A68C00',
    'Portuguese':   '#1a6600',
  };
  const DEFAULT_COLOR = '#888888';
  const MIN_RADIUS = 8;
  const MAX_RADIUS = 40;
  const GLOBAL_MAX = 7000;
  const YEAR_MIN = 1600;
  const YEAR_MAX = 1820;

  function calcRadius(count) {
    const n = parseFloat(count);
    if (!n || n <= 0) return MIN_RADIUS;
    return MIN_RADIUS + (Math.sqrt(n) / Math.sqrt(GLOBAL_MAX)) * (MAX_RADIUS - MIN_RADIUS);
  }

  function parseYear(str) {
    if (!str) return null;
    const m = String(str).match(/\d{4}/);
    return m ? parseInt(m[0]) : null;
  }

  const WORLD_BOUNDS = L.latLngBounds([[-90, -180], [90, 180]]);

  const map = L.map('map', {
    zoomControl: true,
    maxBounds: WORLD_BOUNDS,
    maxBoundsViscosity: 1.0,
  }).setView([15, -20], 3);

  function updateMinZoom() {
    // At zoom Z the world is 256×2^Z px wide; we need that ≥ viewport width
    // so minZoom = ceil(log2(viewportWidth / 256)).
    // e.g. 1440px → ceil(2.49) = 3, 2560px → ceil(3.32) = 4
    const minZoom = Math.ceil(Math.log2(map.getSize().x / 256));
    map.setMinZoom(minZoom);
  }
  map.on('resize', updateMinZoom);
  updateMinZoom();

  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Shaded_Relief/MapServer/tile/{z}/{y}/{x}',
    {
      attribution: 'Tiles &copy; Esri &mdash; Source: Esri',
      maxZoom: 13,
      noWrap: true,
    }
  ).addTo(map);

  const bordersLayer = L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png',
    { attribution: '&copy; <a href="https://carto.com">CARTO</a>', subdomains: 'abcd', noWrap: true, tileSize: 512, zoomOffset: -1 }
  ).addTo(map);

  document.getElementById('toggle-borders').addEventListener('change', function () {
    if (this.checked) {
      bordersLayer.addTo(map);
    } else {
      bordersLayer.remove();
    }
  });

  const legend = L.control({ position: 'bottomright' });
  legend.onAdd = function () {
    const div = L.DomUtil.create('div', 'legend');
    const empireRows = Object.entries(EMPIRE_COLORS).map(([name, color]) =>
      `<div class="legend-item">
        <span class="swatch" style="background:${color}"></span>${name}
      </div>`
    ).join('');

    div.innerHTML = `
      <h4>Empire</h4>
      ${empireRows}
    `;
    return div;
  };
  legend.addTo(map);

  let allPoints = [];
  const markersLayer = L.markerClusterGroup({
    showCoverageOnHover: false,
    zoomToBoundsOnClick: true,
    maxClusterRadius: 20,
    iconCreateFunction: function(cluster) {
      const count = cluster.getChildCount();
      const size = count < 10 ? 34 : count < 100 ? 40 : 48;
      return L.divIcon({
        html: `<div class="marker-cluster-atlas" style="width:${size}px;height:${size}px">${count}</div>`,
        className: '',
        iconSize: L.point(size, size),
        iconAnchor: L.point(size / 2, size / 2),
      });
    },
  }).addTo(map);

  function normalizeFile1(row) {
    const lat = parseFloat(row.lat);
    const lon = parseFloat(row.lon);
    if (isNaN(lat) || isNaN(lon)) return null;
    const yearStr = row['Approximate Year of Data'] || '';
    return {
      source: 'World Dataset',
      community: row['Community'] || '',
      community2: row['Community2'] || '',
      location: [row['Location'], row['Location2']].filter(Boolean).join(', '),
      site: '',
      country: row['Country'] || '',
      empire: (row['Empire'] || '').trim(),
      year: yearStr,
      yearNum: parseYear(yearStr),
      count: row['Volume'],
      countLabel: row['Total Enslaved Persons'] || row['Volume'] || '',
      reference: row['Reference'] || '',
      note: row['Note'] || '',
      lat, lon,
    };
  }

  function normalizeFile2(row) {
    const lat = parseFloat(row.lat);
    const lon = parseFloat(row.lon);
    if (isNaN(lat) || isNaN(lon)) return null;
    const yearStr = row['Approximate Year of Data'] || '';
    return {
      source: 'French Clergy Dataset',
      community: row['Community'] || '',
      community2: row['Religieux-Religieuses'] || '',
      location: row['Province'] || '',
      site: [row['Site'], row['Site-2']].filter(Boolean).join(', '),
      country: row['Country'] || '',
      empire: (row['Empire'] || '').trim(),
      year: yearStr,
      yearNum: parseYear(yearStr),
      count: row['Number-Approx'],
      countLabel: row['Total Enslaved Persons'] || row['Number-Approx'] || '',
      reference: row['Reference'] || '',
      note: row['Note'] || '',
      lat, lon,
    };
  }

  function highlight(text, query) {
    if (!query || !text) return text;
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return String(text).replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
  }

  function buildPopup(p, query) {
    const hl = text => highlight(text, query);
    const name1 = hl(p.community);
    const displayName = p.community2 && p.community2 !== p.community
      ? `${name1} <span style="font-weight:normal;color:#666">(${hl(p.community2)})</span>`
      : name1;
    return `
      <div class="popup">
        <div class="popup-source">${p.source}</div>
        <h3>${displayName}</h3>
        ${p.site ? `<p><strong>Site:</strong> ${hl(p.site)}</p>` : ''}
        ${p.location ? `<p><strong>Location:</strong> ${hl(p.location)}</p>` : ''}
        <p><strong>Country:</strong> ${hl(p.country)}</p>
        <p><strong>Empire:</strong> ${p.empire}</p>
        ${p.year ? `<p><strong>Approx. Year:</strong> ${p.year}</p>` : ''}
        <p><strong>Enslaved Persons:</strong> ${p.countLabel}</p>
        ${p.reference ? `<p><strong>Reference:</strong> <em>${hl(p.reference)}</em></p>` : ''}
        ${p.note ? `<p><strong>Note:</strong> ${hl(p.note)}</p>` : ''}
      </div>
    `;
  }

  let _hoverCloseTimer = null;

  function renderPoints(points, query) {
    markersLayer.clearLayers();
    points.forEach(p => {
      const color = EMPIRE_COLORS[p.empire] || DEFAULT_COLOR;
      const radius = calcRadius(p.count);
      const size = radius * 2;
      const icon = L.divIcon({
        html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};opacity:0.73;border:1.2px solid rgba(255,255,255,0.7);box-sizing:border-box;"></div>`,
        className: 'point-marker-icon',
        iconSize: [size, size],
        iconAnchor: [radius, radius],
      });
      const marker = L.marker([p.lat, p.lon], { icon });
      marker.bindPopup(buildPopup(p, query), {
        maxWidth: 300,
        autoPan: false,
        closeButton: false,
        autoClose: true,
        closeOnClick: false,
      });

      marker.on('mouseover', function() {
        clearTimeout(_hoverCloseTimer);
        const markerPt = map.latLngToContainerPoint(this.getLatLng());
        const mapRect = map.getContainer().getBoundingClientRect();
        const ctrlBottom = document.getElementById('controls').getBoundingClientRect().bottom - mapRect.top;
        const r = calcRadius(p.count);
        const POPUP_H = 220;
        const popup = this.getPopup();
        const flipped = (markerPt.y - r) < ctrlBottom + POPUP_H + 8;
        popup._flipped = flipped;
        popup.options.offset = flipped
          ? L.point(0, r + POPUP_H + 10)
          : L.point(0, -r);
        this.openPopup();
      });

      marker.on('mouseout', function() {
        const m = this;
        _hoverCloseTimer = setTimeout(() => m.closePopup(), 180);
      });

      marker.on('popupopen', function() {
        const popup = this.getPopup();
        const el = popup.getElement();
        if (!el) return;
        const m = this;

        el.addEventListener('mouseenter', () => clearTimeout(_hoverCloseTimer));
        el.addEventListener('mouseleave', () => {
          _hoverCloseTimer = setTimeout(() => m.closePopup(), 180);
        });

        if (popup._flipped) {
          const tip = el.querySelector('.leaflet-popup-tip-container');
          if (tip) {
            tip.style.position = 'absolute';
            tip.style.top = '0';
            tip.style.marginTop = '0';
            tip.style.transform = 'rotate(180deg)';
          }
          const wrapper = el.querySelector('.leaflet-popup-content-wrapper');
          if (wrapper) wrapper.style.marginTop = '17px';
        }
      });

      markersLayer.addLayer(marker);
    });
  }

  function applyFilters() {
    const query = document.getElementById('search-box').value.trim().toLowerCase();
    const showWorld = document.getElementById('toggle-world').checked;
    const showFrench = document.getElementById('toggle-french').checked;
    const yMin = parseInt(document.getElementById('year-min').value);
    const yMax = parseInt(document.getElementById('year-max').value);
    const rangeValid = !isNaN(yMin) && !isNaN(yMax) && yMin <= yMax;

    const filtered = allPoints.filter(p => {
      if (p.source === 'World Dataset' && !showWorld) return false;
      if (p.source === 'French Clergy Dataset' && !showFrench) return false;
      if (rangeValid && p.yearNum !== null && (p.yearNum < yMin || p.yearNum > yMax)) return false;
      if (!query) return true;
      return (
        p.country.toLowerCase().includes(query) ||
        p.note.toLowerCase().includes(query) ||
        p.reference.toLowerCase().includes(query) ||
        p.community.toLowerCase().includes(query) ||
        p.location.toLowerCase().includes(query) ||
        p.site.toLowerCase().includes(query)
      );
    });

    renderPoints(filtered, query);
    document.getElementById('match-count').textContent =
      `${filtered.length} entr${filtered.length !== 1 ? 'ies' : 'y'} shown`;
  }

  const inputMin = document.getElementById('year-min');
  const inputMax = document.getElementById('year-max');

  function updateYearInputs() {
    const lo = parseInt(inputMin.value);
    const hi = parseInt(inputMax.value);
    const invalid = !isNaN(lo) && !isNaN(hi) && lo > hi;
    inputMin.classList.toggle('invalid', invalid);
    inputMax.classList.toggle('invalid', invalid);
    applyFilters();
  }

  inputMin.addEventListener('input', updateYearInputs);
  inputMax.addEventListener('input', updateYearInputs);

  async function fetchCSV(path) {
    const response = await fetch(path);
    const text = await response.text();
    return Papa.parse(text, { header: true, skipEmptyLines: true });
  }

  async function loadData() {
    document.getElementById('match-count').textContent = 'Loading…';
    try {
      const [r1, r2] = await Promise.all([
        fetchCSV('world_eccl.csv'),
        fetchCSV('french_clergy.csv'),
      ]);
      allPoints = [
        ...r1.data.map(normalizeFile1),
        ...r2.data.map(normalizeFile2),
      ].filter(p => p !== null);
      applyFilters();
    } catch (err) {
      document.getElementById('match-count').textContent = 'Error loading data';
      console.error(err);
    }
  }

  document.getElementById('search-box').addEventListener('input', applyFilters);
  document.getElementById('toggle-world').addEventListener('change', applyFilters);
  document.getElementById('toggle-french').addEventListener('change', applyFilters);
  document.getElementById('reset-zoom').addEventListener('click', () => map.setView([15, -20], 3));

  loadData();
</script>
</body>
</html>
